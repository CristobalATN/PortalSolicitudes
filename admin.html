<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Portal de Solicitudes ATN</title>
    <link rel="icon" href="./assets/solologo-1.png" type="image/png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="./assets/solologo-1.png" alt="ATN" style="height:32px;">
                Portal de Solicitudes
                <span class="role-tag">Admin</span>
            </div>
            <div style="display:flex; gap:0.5rem; align-items:center;">
                <span id="userEmail" style="font-size:0.8rem; color:var(--text-muted);"></span>
                <button id="logoutBtn" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Salir
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- STATS -->
        <div class="stats-grid" style="margin-bottom:1.5rem;">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card" style="border-left:3px solid #f59e0b;">
                <div class="stat-value" id="statRecibida" style="color:#b45309;">—</div>
                <div class="stat-label">Recibidas</div>
            </div>
            <div class="stat-card" style="border-left:3px solid #3b82f6;">
                <div class="stat-value" id="statEnProceso" style="color:#1d4ed8;">—</div>
                <div class="stat-label">En proceso</div>
            </div>
            <div class="stat-card" style="border-left:3px solid #10b981;">
                <div class="stat-value" id="statResuelta" style="color:#059669;">—</div>
                <div class="stat-label">Resueltas</div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="glass-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.75rem;">
                <div class="filters-bar" style="margin:0;">
                    <button class="filter-chip active" data-filter="todos">Todos</button>
                    <button class="filter-chip" data-filter="recibida"><i class="fa-solid fa-inbox" style="font-size:0.7rem;"></i> Recibida</button>
                    <button class="filter-chip" data-filter="en-proceso"><i class="fa-solid fa-spinner" style="font-size:0.7rem;"></i> En proceso</button>
                    <button class="filter-chip" data-filter="resuelta"><i class="fa-solid fa-check-circle" style="font-size:0.7rem;"></i> Resuelta</button>
                </div>
                <div style="display:flex; gap:0.5rem; align-items:center;">
                    <button id="btnSortFecha" class="btn btn-secondary" title="Ordenar por fecha"><i class="fa-solid fa-arrow-down-wide-short"></i> Más reciente</button>
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar por RUT o tipo...">
                </div>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>RUT</th>
                            <th>Tipo de solicitud</th>
                            <th>Estado</th>
                            <th style="text-align:right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" style="text-align:center; padding:2.5rem;"><div class="loader"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>&copy; 2026 ATN Chile — Portal de Solicitudes</footer>

    <!-- MODAL DETALLE -->
    <div class="modal-overlay" id="modalDetalle">
        <div class="modal" style="max-width:650px;">
            <div class="modal-header">
                <h3><i class="fa-solid fa-file-lines" style="color:var(--primary-green);"></i> Detalle de solicitud</h3>
                <button class="btn-close" id="closeDetalle"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="detalleContent"></div>
            <div style="display:flex; gap:0.75rem; margin-top:1.25rem; flex-wrap:wrap;">
                <button class="btn btn-secondary" id="btnEnProceso" style="color:#1d4ed8;">
                    <i class="fa-solid fa-spinner"></i> Marcar en proceso
                </button>
                <button class="btn btn-success" id="btnResuelta">
                    <i class="fa-solid fa-check-circle"></i> Marcar resuelta
                </button>
                <button class="btn btn-danger" id="btnEliminar" style="margin-left:auto;">
                    <i class="fa-solid fa-trash"></i> Eliminar
                </button>
                <button class="btn btn-secondary" id="btnVolver">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { verifySession, logout } from "./auth.js";
        import {
            collection, onSnapshot, doc, updateDoc, deleteDoc,
            query, orderBy, Timestamp
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        let allDocs     = [];
        let filtroActivo = 'todos';
        let searchTerm  = '';
        let sortOrder   = 'desc'; // desc = más reciente primero
        let solicitudActual = null;

        const TIPOS = {
            'actualizacion-datos-personales':  'Actualización datos personales',
            'actualizacion-datos-contacto':    'Actualización datos contacto',
            'actualizacion-datos-bancarios':   'Actualización datos bancarios',
            'actualizacion-datos-autor-ambito':'Actualización ámbito autor',
            'actualizacion-datos-autor-sociedades': 'Actualización sociedades',
            'exhibicion-obra-extranjero':      'Exhibición obra extranjero',
            'conflicto-obra':                  'Conflicto de obra',
            'certificado-afiliacion':          'Certificado afiliación',
            'certificado-derechos-recibidos':  'Certificado derechos recibidos',
            'certificado-obras-declaradas':    'Certificado obras declaradas',
            'otro-certificado':                'Otro certificado',
            'desafiliacion':                   'Desafiliación',
            'otro':                            'Otro',
        };

        document.getElementById('logoutBtn').addEventListener('click', logout);

        document.addEventListener('sessionReady', (e) => {
            document.getElementById('userEmail').textContent = e.detail.email;
        });

        verifySession('admin');

        // Listener en tiempo real
        const q = query(collection(db, 'solicitudes'), orderBy('fechaEnvio', 'desc'));
        onSnapshot(q, (snap) => {
            allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            actualizarStats();
            renderTabla();
        });

        // Filtros
        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroActivo = btn.dataset.filter;
                renderTabla();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase().trim();
            renderTabla();
        });

        function filtrarDocs() {
            const filtered = allDocs.filter(d => {
                if (filtroActivo !== 'todos' && d.estado !== filtroActivo) return false;
                if (searchTerm) {
                    const rut   = (d.rut || '').toLowerCase();
                    const tipo  = (d.tipoSolicitud || '').toLowerCase();
                    if (!rut.includes(searchTerm) && !tipo.includes(searchTerm)) return false;
                }
                return true;
            });
            return filtered.sort((a, b) => {
                const ta = a.fechaEnvio?.toDate ? a.fechaEnvio.toDate().getTime() : new Date(a.fechaEnvio||0).getTime();
                const tb = b.fechaEnvio?.toDate ? b.fechaEnvio.toDate().getTime() : new Date(b.fechaEnvio||0).getTime();
                return sortOrder === 'desc' ? tb - ta : ta - tb;
            });
        }

        function actualizarStats() {
            document.getElementById('statTotal').textContent     = allDocs.length;
            document.getElementById('statRecibida').textContent  = allDocs.filter(d => d.estado === 'recibida').length;
            document.getElementById('statEnProceso').textContent = allDocs.filter(d => d.estado === 'en-proceso').length;
            document.getElementById('statResuelta').textContent  = allDocs.filter(d => d.estado === 'resuelta').length;
        }

        function badgeEstado(estado) {
            const map = {
                'recibida':   `<span class="badge badge-recibida"><i class="fa-solid fa-inbox"></i> Recibida</span>`,
                'en-proceso': `<span class="badge badge-en-proceso"><i class="fa-solid fa-spinner"></i> En proceso</span>`,
                'resuelta':   `<span class="badge badge-resuelta"><i class="fa-solid fa-check-circle"></i> Resuelta</span>`,
            };
            return map[estado] || `<span class="badge">${estado}</span>`;
        }

        function formatFecha(ts) {
            if (!ts) return '—';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function renderTabla() {
            const tbody = document.getElementById('tableBody');
            const docs  = filtrarDocs();

            if (docs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No hay solicitudes que coincidan.</p></div></td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            docs.forEach(d => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.innerHTML = `
                    <td style="color:var(--text-muted); font-size:0.82rem;">${formatFecha(d.fechaEnvio)}</td>
                    <td><strong>${d.rut || '—'}</strong></td>
                    <td><span class="tipo-badge">${TIPOS[d.tipoSolicitud] || d.tipoSolicitud || '—'}</span></td>
                    <td>${badgeEstado(d.estado)}</td>
                    <td style="text-align:right;">
                        <button class="btn btn-secondary btn-ver" style="font-size:0.8rem;">
                            <i class="fa-solid fa-eye"></i> Ver
                        </button>
                    </td>
                `;
                tr.querySelector('.btn-ver').addEventListener('click', () => abrirDetalle(d));
                tbody.appendChild(tr);
            });
        }

        // Etiquetas legibles para campos
        const CAMPO_LABELS = {
            nombre: 'Nombre', seudonimo: 'Seudónimo', genero: 'Género',
            email: 'Email', telefono: 'Teléfono',
            pais: 'País', region: 'Región', comuna: 'Comuna',
            direccion: 'Dirección', deptoCasaOficina: 'Depto/Casa/Oficina',
            estado: 'Estado', distrito: 'Distrito',
            'tipo-banco': 'Tipo de banco', banco: 'Banco',
            'numero-cuenta': 'N° de cuenta', 'tipo-cuenta': 'Tipo de cuenta',
            'swift-iban': 'Swift / IBAN', 'direccion-banco': 'Dirección del banco',
            ambito: 'Ámbito', clase: 'Clase',
            ambitos: 'Ámbitos seleccionados', clases: 'Clases seleccionadas',
            motivo: 'Motivo de la solicitud', observaciones: 'Observaciones',
            detalleSolicitud: 'Detalle de la solicitud',
            descripcion: 'Descripción del conflicto', obra: 'Obra en conflicto',
            ambitoAfiliacion: 'Incluir ámbito en certificado',
            claseAfiliacion: 'Incluir clase en certificado',
            ambitosObras: 'Ámbitos de obras',
            incluirRolObras: 'Incluir rol en certificado',
            incluirPorcentajeObras: 'Incluir porcentaje en certificado',
            fechaInicio: 'Fecha inicio', fechaFin: 'Fecha fin',
        };

        const TIPO_USUARIO_LABEL = {
            'socio-vigente': 'Socio vigente',
            'representante-legal': 'Representante legal',
        };

        const ACCION_REQUERIDA = {
            'actualizacion-datos-personales':   'Actualizar datos en <strong>Contactos → [socio]</strong>',
            'actualizacion-datos-contacto':     'Actualizar datos en <strong>Contactos → [socio]</strong>',
            'actualizacion-datos-bancarios':    'Actualizar datos bancarios en <strong>Contactos → [socio] → Datos bancarios</strong>',
            'actualizacion-datos-autor-ambito': 'Actualizar ámbito/clase en <strong>Contactos → [socio] → Datos de autor</strong>',
            'actualizacion-datos-autor-sociedades': 'Actualizar sociedades en <strong>Contactos → [socio] → Otras sociedades</strong>',
            'exhibicion-obra-extranjero':       'Registrar exhibición en <strong>Proyectos → obra correspondiente → Exhibiciones</strong>',
            'conflicto-obra':                   'Revisar y gestionar conflicto en <strong>Proyectos → obra correspondiente</strong>',
            'certificado-afiliacion':           'Generar y enviar <strong>certificado de afiliación</strong> al socio',
            'certificado-derechos-recibidos':   'Generar y enviar <strong>certificado de derechos recibidos</strong> al socio',
            'certificado-obras-declaradas':     'Generar y enviar <strong>certificado de obras declaradas</strong> al socio',
            'otro-certificado':                 'Revisar solicitud y generar <strong>certificado solicitado</strong>',
            'desafiliacion':                    'Iniciar proceso de <strong>desafiliación</strong> y contactar al socio por correo',
            'otro':                             'Revisar solicitud y <strong>contactar al socio</strong> para coordinar',
        };

        function renderCampo(label, valor) {
            if (!valor || valor === '' || (Array.isArray(valor) && valor.length === 0)) return '';
            const val = Array.isArray(valor) ? valor.join(', ') : String(valor);
            return `<div class="detalle-item">
                <span class="detalle-label">${label}</span>
                <span class="detalle-valor">${val}</span>
            </div>`;
        }

        function abrirDetalle(d) {
            solicitudActual = d;
            const content = document.getElementById('detalleContent');
            const datos   = d.datos || {};
            const campos  = datos.campos || {};

            // ── ENCABEZADO ────────────────────────────────────────────────────
            let html = `
            <div style="background:rgba(9,113,55,0.06); border:1px solid rgba(9,113,55,0.2); border-radius:0.75rem; padding:1rem 1.25rem; margin-bottom:1.25rem;">
                <p style="font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--primary-green); margin-bottom:0.5rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> Acción requerida
                </p>
                <p style="font-size:0.875rem; line-height:1.5;">${ACCION_REQUERIDA[d.tipoSolicitud] || 'Revisar solicitud y contactar al socio.'}</p>
            </div>

            <div style="margin-bottom:1.25rem; padding-bottom:1.25rem; border-bottom:1px solid var(--border);">
                <p style="font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:0.75rem;">Datos del solicitante</p>
                <div class="detalle-grid">
                    ${renderCampo('RUT', d.rut)}
                    ${renderCampo('Tipo de solicitante', TIPO_USUARIO_LABEL[datos.tipoUsuario] || datos.tipoUsuario)}
                    ${renderCampo('Email', datos.emailValidacion || datos.email)}
                    ${renderCampo('Fecha de envío', formatFecha(d.fechaEnvio))}
                    ${renderCampo('Tipo de solicitud', TIPOS[d.tipoSolicitud] || d.tipoSolicitud)}
                    <div class="detalle-item">
                        <span class="detalle-label">Estado</span>
                        <span class="detalle-valor">${badgeEstado(d.estado)}</span>
                    </div>
                </div>
            </div>`;

            // ── DATOS ESPECÍFICOS SEGÚN TIPO ──────────────────────────────────
            let camposHtml = '';

            // Datos personales / contacto / bancarios
            const camposLabeled = Object.entries(campos).filter(([k,v]) => v && v !== '' && !(Array.isArray(v) && v.length === 0));
            if (camposLabeled.length > 0) {
                camposHtml += '<div class="detalle-grid">';
                camposLabeled.forEach(([k, v]) => {
                    camposHtml += renderCampo(CAMPO_LABELS[k] || k, v);
                });
                camposHtml += '</div>';
            }

            // Exhibiciones
            if (datos.exhibiciones && datos.exhibiciones.length > 0) {
                camposHtml += `<div style="overflow-x:auto; margin-top:0.5rem;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.82rem;">
                        <thead><tr style="background:rgba(9,113,55,0.08);">
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Ámbito</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Obra</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">País</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Canal</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Inicio</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Término</th>
                        </tr></thead>
                        <tbody>${datos.exhibiciones.map(e => `<tr>
                            <td style="padding:0.5rem;">${e.ambito || '—'}</td>
                            <td style="padding:0.5rem;">${e.obra || '—'}</td>
                            <td style="padding:0.5rem;">${e.pais || '—'}</td>
                            <td style="padding:0.5rem;">${e.canal || '—'}</td>
                            <td style="padding:0.5rem;">${e.fecha || '—'}</td>
                            <td style="padding:0.5rem;">${e.fechaTermino || '—'}</td>
                        </tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }

            // Sociedades
            if (datos.sociedades && datos.sociedades.length > 0) {
                camposHtml += `<div style="overflow-x:auto; margin-top:0.5rem;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.82rem;">
                        <thead><tr style="background:rgba(9,113,55,0.08);">
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Sociedad</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">País</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Ámbito</th>
                            <th style="padding:0.5rem; text-align:left; border-bottom:1px solid var(--border);">Clase</th>
                        </tr></thead>
                        <tbody>${datos.sociedades.map(s => `<tr>
                            <td style="padding:0.5rem;">${s.sociedad || '—'}</td>
                            <td style="padding:0.5rem;">${s.pais || '—'}</td>
                            <td style="padding:0.5rem;">${s.ambito || '—'}</td>
                            <td style="padding:0.5rem;">${s.clase || '—'}</td>
                        </tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }

            // Campos sueltos directos en datos (conflicto, certificados, etc.)
            const camposDirectos = [
                'ambito', 'obra', 'descripcion', 'motivo', 'detalleSolicitud',
                'ambitoAfiliacion', 'claseAfiliacion',
                'ambitosObras', 'incluirRolObras', 'incluirPorcentajeObras',
                'fechaInicio', 'fechaFin'
            ];

            // También buscar dentro de datos.campos los campos de ámbito/clase
            const ambitosVal  = datos.ambitos  || datos.campos?.ambitos  || campos.ambitos;
            const clasesVal   = datos.clases   || datos.campos?.clases   || campos.clases;

            const camposDirect = camposDirectos.filter(k => {
                const v = datos[k];
                return v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && v.length === 0);
            });

            const BOOL_LABEL = { 'si': 'SÍ', 'no': 'NO' };
            const BOOL_KEYS  = ['ambitoAfiliacion','claseAfiliacion','incluirRolObras','incluirPorcentajeObras'];

            if (ambitosVal?.length || clasesVal?.length || camposDirect.length > 0) {
                camposHtml += '<div class="detalle-grid" style="margin-top:0.5rem;">';
                if (ambitosVal?.length)  camposHtml += renderCampo('Ámbitos seleccionados',  Array.isArray(ambitosVal) ? ambitosVal.join(', ') : ambitosVal);
                if (clasesVal?.length)   camposHtml += renderCampo('Clases seleccionadas',   Array.isArray(clasesVal)  ? clasesVal.join(', ')  : clasesVal);
                camposDirect.forEach(k => {
                    const val = BOOL_KEYS.includes(k) ? (BOOL_LABEL[datos[k]] || datos[k]) : datos[k];
                    camposHtml += renderCampo(CAMPO_LABELS[k] || k, val);
                });
                camposHtml += '</div>';
            }

            // Observaciones
            if (datos.observaciones || campos.observaciones) {
                const obs = datos.observaciones || campos.observaciones;
                camposHtml += `<div style="margin-top:0.75rem;">
                    <span class="detalle-label">Observaciones</span>
                    <p style="font-size:0.875rem; line-height:1.6; margin-top:0.25rem; background:rgba(0,0,0,0.03); padding:0.75rem; border-radius:0.5rem;">${obs}</p>
                </div>`;
            }

            if (camposHtml) {
                html += `<div>
                    <p style="font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:0.75rem;">Datos de la solicitud</p>
                    ${camposHtml}
                </div>`;
            }

            content.innerHTML = html;

            document.getElementById('btnEnProceso').style.display = d.estado === 'recibida'   ? '' : 'none';
            document.getElementById('btnResuelta').style.display  = d.estado !== 'resuelta'   ? '' : 'none';

            document.getElementById('modalDetalle').classList.add('active');
        }

        document.getElementById('closeDetalle').addEventListener('click', () => {
            document.getElementById('modalDetalle').classList.remove('active');
        });
        document.getElementById('btnVolver').addEventListener('click', () => {
            document.getElementById('modalDetalle').classList.remove('active');
        });

        document.getElementById('btnEliminar').addEventListener('click', async () => {
            if (!solicitudActual) return;
            if (!confirm('¿Estás seguro de que deseas eliminar esta solicitud? Esta acción no se puede deshacer.')) return;
            try {
                await deleteDoc(doc(db, 'solicitudes', solicitudActual.id));
                document.getElementById('modalDetalle').classList.remove('active');
            } catch(err) {
                alert('Error al eliminar la solicitud.');
                console.error(err);
            }
        });

        // Botón ordenar por fecha
        document.getElementById('btnSortFecha').addEventListener('click', () => {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            const btn = document.getElementById('btnSortFecha');
            btn.innerHTML = sortOrder === 'desc'
                ? '<i class="fa-solid fa-arrow-down-wide-short"></i> Más reciente'
                : '<i class="fa-solid fa-arrow-up-wide-short"></i> Más antiguo';
            renderTabla();
        });

        document.getElementById('btnEnProceso').addEventListener('click', async () => {
            if (!solicitudActual) return;
            await updateDoc(doc(db, 'solicitudes', solicitudActual.id), { estado: 'en-proceso' });
            document.getElementById('modalDetalle').classList.remove('active');
        });

        document.getElementById('btnResuelta').addEventListener('click', async () => {
            if (!solicitudActual) return;
            await updateDoc(doc(db, 'solicitudes', solicitudActual.id), { estado: 'resuelta' });
            document.getElementById('modalDetalle').classList.remove('active');
        });
    </script>
</body>
