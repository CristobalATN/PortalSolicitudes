<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Solicitudes — ATN</title>
    <link rel="icon" href="./assets/solologo-1.png" type="image/png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div style="display:flex; flex-direction:column; min-height:100vh; justify-content:center; align-items:center; padding:1.5rem;">

        <div class="auth-container glass-panel">
            <div class="auth-header">
                <img src="./assets/Logo-Fondo-Transparente@3x(1).png" alt="ATN" style="height:60px; margin-bottom:1.25rem;">
                <h2>Portal de Solicitudes</h2>
                <p style="color:var(--text-muted); font-size:0.875rem;">Sociedad de Directores Audiovisuales, Guionistas y Dramaturgos</p>
            </div>

            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope" style="color:var(--primary-green); margin-right:0.35rem;"></i> Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="tu@correo.cl" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock" style="color:var(--primary-green); margin-right:0.35rem;"></i> Contraseña / N° de socio</label>
                <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" autocomplete="current-password">
                <small style="color:var(--text-muted); font-size:0.78rem; margin-top:0.35rem; display:block;">
                    Socios: usa tu número de socio como contraseña
                </small>
            </div>

            <button id="btnLogin" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar
            </button>
        </div>

        <p style="margin-top:1.25rem; font-size:0.8rem; color:var(--text-muted);">
            &copy; 2026 ATN Chile
        </p>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // Si ya hay sesión activa, redirigir
        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            try {
                const snap = await getDoc(doc(db, "usuarios", user.uid));
                if (!snap.exists()) return;
                const rol = snap.data().rol;
                if (rol === 'socio') window.location.href = 'socio.html';
                else window.location.href = 'admin.html';
            } catch(e) {}
        });

        function mostrarError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.add('active');
        }

        function ocultarError() {
            document.getElementById('errorMsg').classList.remove('active');
        }

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            ocultarError();

            if (!email || !password) {
                mostrarError('Completa todos los campos.'); return;
            }

            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Ingresando...';

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const snap = await getDoc(doc(db, "usuarios", cred.user.uid));
                if (!snap.exists()) { mostrarError('Usuario no configurado. Contacta al administrador.'); return; }
                const rol = snap.data().rol;
                if (rol === 'socio') window.location.href = 'socio.html';
                else window.location.href = 'admin.html';
            } catch(err) {
                const msgs = {
                    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
                    'auth/user-not-found':     'Usuario no encontrado.',
                    'auth/wrong-password':     'Contraseña incorrecta.',
                    'auth/too-many-requests':  'Demasiados intentos. Espera unos minutos.',
                };
                mostrarError(msgs[err.code] || 'Error al iniciar sesión. Intenta nuevamente.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar';
            }
        });

        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });
    </script>
</body>
</html>
